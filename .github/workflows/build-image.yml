name: build-image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      beignet_version:
        description: "beignet npm version to bundle"
        required: false
        default: "latest"

env:
  IMAGE: ghcr.io/coreyphillips/beignet-app
  # The beignet npm version bundled in the image. Decoupled from the app tag,
  # since the app and the beignet library version independently.
  # 0.5.1 reports why a channel open failed rather than emitting the reason to
  # nobody; 0.5.2 attaches the channel id, so a failure can be tied to the open
  # it belongs to; 0.5.3 takes the funding fee rate on the open and prices an
  # on-chain transaction exactly (POST /tx/quote). The dashboard needs all three.
  # 0.5.4 is a large engine upgrade (channel splicing with quiescence, safer
  # sweep/justice handling, BOLT12 blinded reply paths, correct P2TR input
  # weights) with a byte-identical daemon surface: CLI, env config, HTTP routes
  # and openapi.json are unchanged from 0.5.3, verified by diffing the two
  # published tarballs, so the manager and UI need no changes.
  # 0.5.5 stops /health reporting "degraded" while a channel open, splice or
  # cooperative close is in progress; only established-but-broken channels
  # (or no peers for operational ones) degrade the wallet now.
  # 0.5.6 routes over our own channels when the gossip copy is missing our
  # channel_update, so paying a directly-connected peer over an announced
  # channel no longer fails with NO_ROUTE.
  # 0.5.7 prices splices (POST /channel/splice-quote): the daemon quotes the
  # fee and the largest fundable amount, so the dashboard's Max offers an
  # amount the coin selection will actually fund.
  # 0.5.8 accounts for splicing funds: getInfo/balance gain a splicing bucket
  # holding the POST-splice settle-to balance (the live channel balance stays
  # pre-splice until splice_locked), and channel listings carry
  # pendingSpliceLocalBalanceSats, so a wallet mid-splice never reads as empty.
  # 0.6.0 pays during splices: HTLC traffic flows straight through a splice's
  # confirmation window (ECDSA channels), mirrored onto both fundings, with
  # routing/forwarding/balances aware of the window and a unilateral exit on
  # whichever funding confirms. Verified live against real CLN on regtest
  # (11/11 splice-matrix interop, including four pay-during-splice cases).
  # 0.6.1 makes splices restart-proof: after the point of no return, recovery
  # and unilateral exit depend only on persisted material (session-free
  # adoption, batch re-signing, exact sig parameters stored with the sigs),
  # and taproot splices refuse cleanly on the wire instead of wedging.
  # 0.6.2 puts htlcUsable/payThroughSplice on the /channels wire (the CLI
  # serializer dropped them, re-parking mid-splice channels in the Send tab
  # while the daemon paid fine) and makes channel diagnostics splice-aware.
  BEIGNET_VERSION: "0.6.9"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev"
          fi
          BEIGNET="${{ github.event.inputs.beignet_version || env.BEIGNET_VERSION }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "beignet_version=$BEIGNET" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BEIGNET_VERSION=${{ steps.meta.outputs.beignet_version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
