name: build-image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      beignet_version:
        description: "beignet npm version to bundle"
        required: false
        default: "latest"

env:
  IMAGE: ghcr.io/coreyphillips/beignet-app
  # The beignet npm version bundled in the image. Decoupled from the app tag,
  # since the app and the beignet library version independently.
  # 0.5.1 is the first release that reports why a channel open failed, rather
  # than emitting the reason to nobody; 0.5.2 attaches the channel id to those
  # reports, so a failure can be tied to the open it belongs to. The dashboard
  # depends on both.
  BEIGNET_VERSION: "0.5.2"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev"
          fi
          BEIGNET="${{ github.event.inputs.beignet_version || env.BEIGNET_VERSION }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "beignet_version=$BEIGNET" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BEIGNET_VERSION=${{ steps.meta.outputs.beignet_version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
