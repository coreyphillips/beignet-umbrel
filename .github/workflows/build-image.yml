name: build-image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      beignet_version:
        description: "beignet npm version to bundle"
        required: false
        default: "latest"

env:
  IMAGE: ghcr.io/coreyphillips/beignet-app
  # The beignet npm version bundled in the image. Decoupled from the app tag,
  # since the app and the beignet library version independently.
  # 0.5.1 reports why a channel open failed rather than emitting the reason to
  # nobody; 0.5.2 attaches the channel id, so a failure can be tied to the open
  # it belongs to; 0.5.3 takes the funding fee rate on the open and prices an
  # on-chain transaction exactly (POST /tx/quote). The dashboard needs all three.
  # 0.5.4 is a large engine upgrade (channel splicing with quiescence, safer
  # sweep/justice handling, BOLT12 blinded reply paths, correct P2TR input
  # weights) with a byte-identical daemon surface: CLI, env config, HTTP routes
  # and openapi.json are unchanged from 0.5.3, verified by diffing the two
  # published tarballs, so the manager and UI need no changes.
  # 0.5.5 stops /health reporting "degraded" while a channel open, splice or
  # cooperative close is in progress; only established-but-broken channels
  # (or no peers for operational ones) degrade the wallet now.
  # 0.5.6 routes over our own channels when the gossip copy is missing our
  # channel_update, so paying a directly-connected peer over an announced
  # channel no longer fails with NO_ROUTE.
  # 0.5.7 prices splices (POST /channel/splice-quote): the daemon quotes the
  # fee and the largest fundable amount, so the dashboard's Max offers an
  # amount the coin selection will actually fund.
  # 0.5.8 accounts for splicing funds: getInfo/balance gain a splicing bucket
  # holding the POST-splice settle-to balance (the live channel balance stays
  # pre-splice until splice_locked), and channel listings carry
  # pendingSpliceLocalBalanceSats, so a wallet mid-splice never reads as empty.
  # 0.6.0 pays during splices: HTLC traffic flows straight through a splice's
  # confirmation window (ECDSA channels), mirrored onto both fundings, with
  # routing/forwarding/balances aware of the window and a unilateral exit on
  # whichever funding confirms. Verified live against real CLN on regtest
  # (11/11 splice-matrix interop, including four pay-during-splice cases).
  # 0.6.1 makes splices restart-proof: after the point of no return, recovery
  # and unilateral exit depend only on persisted material (session-free
  # adoption, batch re-signing, exact sig parameters stored with the sigs),
  # and taproot splices refuse cleanly on the wire instead of wedging.
  # 0.6.2 puts htlcUsable/payThroughSplice on the /channels wire (the CLI
  # serializer dropped them, re-parking mid-splice channels in the Send tab
  # while the daemon paid fine) and makes channel diagnostics splice-aware.
  # 0.7.0 makes channel opens work against dual-fund peers (openChannel routes
  # to the v2 protocol those peers require and auto-funds the interactive tx
  # from the wallet), fixes payment retry (retries never dispatched; a payee
  # one block ahead failed permanently; one inbound HTLC could re-forward on
  # every commitment round), counts pay-through-splice channels in /liquidity
  # (the card zeroed for the whole splice window), tears down opens whose
  # funding fails instead of stranding SENT_OPEN ghosts, adds a forwarding
  # opt-out (--no-forwarding / BEIGNET_FORWARDING_ENABLED; default stays ON so
  # umbrel nodes keep routing) with per-forward daemon logging, and carries the
  # BOLT 4 payloads on forwarding failures. Daemon surface is additive only:
  # existing routes, env and config unchanged.
  # 0.7.1 fixes three field findings from 0.7.0 testing: a REMOTE-initiated
  # cooperative close paid P2WPKH(funding_pubkey) — invisible to the wallet
  # until the startup recovery sweep — because the constructor never handed the
  # wallet sweep script to the channel manager; advertised htlc_maximum_msat /
  # htlc_minimum_msat derived from OUR config side (channels opened under the
  # old 500k in-flight default advertised a 500k per-HTLC ceiling for life,
  # refusing 1M sats on a 4M channel), now remote-derived and self-healing on
  # the next update refresh; and a payment offered at the sender's exact
  # spendable ceiling could force-close a healthy channel over sats-scale
  # margin disagreement — senders now keep an LND-style fee-spike buffer (2x
  # rate, spare HTLC slot, anchor outputs counted) and receivers price
  # affordability at the live commitment feerate. Daemon surface unchanged.
  # 0.7.2 makes beignet-to-beignet channel opens actually work: a plain
  # acceptor of a dual-funded (v2) open never took its interactive-tx turns,
  # so every beignet-to-beignet open deadlocked in DUAL_FUNDING_V2 (CLN
  # acceptors reply on their own, which is why interop never caught it). Max
  # funding is now supported on v2 opens too: the engine quotes the whole
  # balance minus the interactive-tx fee with the same weight formula the
  # channel uses, so the funding tx sweeps with no change output. Also fixes
  # mid-negotiation v2 channels listing an empty peerPubkey, which the
  # dashboard rendered as an unknown offline peer with a broken Reconnect.
  # Daemon surface: /channel/open additionally accepts max and satsPerVbyte
  # (parity with connect-and-open); everything else unchanged.
  # 0.7.3 adds trusted zero-conf channel opens for the dashboard's own-node
  # picker: connect-and-open accepts trusted, which puts the zero_conf channel
  # type on the wire (previously the bit was never set, so zero-conf never
  # actually negotiated), keeps the standard v1/v2 routing (dual-fund peers
  # ride open_channel2), and both peers fast-track channel_ready so the
  # channel is usable before the funding confirms. Reserves and everything
  # else stay standard BOLT 2. The acceptor must hold the opener in its
  # trusted set (POST /trusted-peer/add, which already existed) or it rejects
  # the proposal. Also fixes a pathfinding bug where an invoice hint naming an
  # announced channel could kill that exact route. Daemon surface:
  # connect-and-open additionally accepts trusted; everything else unchanged.
  BEIGNET_VERSION: "0.7.3"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev"
          fi
          BEIGNET="${{ github.event.inputs.beignet_version || env.BEIGNET_VERSION }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "beignet_version=$BEIGNET" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BEIGNET_VERSION=${{ steps.meta.outputs.beignet_version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
