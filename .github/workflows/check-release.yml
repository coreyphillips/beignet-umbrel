name: check-release

# Guards against the version/image drift the manual digest repin can introduce:
# fails if umbrel-app.yml advertises a version the pinned manager image tag does
# not match, so a release cannot ship "new version, old image" by accident.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-image-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify umbrel-app.yml version matches the pinned image tag
        run: |
          APP_VERSION=$(grep -E '^version:' beignet-wallet/umbrel-app.yml \
            | sed -E 's/version:[[:space:]]*"?([^"[:space:]]+)"?.*/\1/')
          IMAGE_TAG=$(grep -E 'image:.*beignet-app:' beignet-wallet/docker-compose.yml \
            | sed -E 's|.*beignet-app:([0-9]+\.[0-9]+\.[0-9]+).*|\1|')
          echo "umbrel-app.yml version: '$APP_VERSION'"
          echo "docker-compose tag:     '$IMAGE_TAG'"
          if [ -z "$APP_VERSION" ] || [ -z "$IMAGE_TAG" ]; then
            echo "::error::Could not parse the app version or image tag."
            exit 1
          fi
          if [ "$APP_VERSION" != "$IMAGE_TAG" ]; then
            echo "::error::umbrel-app.yml version ($APP_VERSION) does not match the docker-compose image tag ($IMAGE_TAG). Repin the manager image before release."
            exit 1
          fi
