version: "3.7"

services:
  app_proxy:
    environment:
      # Matches the container_name pinned on the manager below. Never a derived
      # name: legacy Umbrel does not set container_name, so the name it would get
      # depends on the compose binary the node happens to have (v1 yields
      # beignet-wallet_manager_1, v2 yields beignet-wallet-manager-1). app_proxy
      # blocks forever in its wait-for-port loop if this does not resolve, and the
      # app hangs at "Starting" with the rest of the stack looking healthy.
      APP_HOST: beignet-wallet_manager_1
      APP_PORT: 3000

  manager:
    # Pinned rather than derived, so the name is identical on compose v1, compose
    # v2 and umbrelOS 1.x (whose patchComposeFile only fills container_name in
    # when the app has not set one, so it defers to this).
    container_name: beignet-wallet_manager_1
    # Tag matches `version` in umbrel-app.yml: the release build publishes the
    # image under the app version, so the two move together. The digest pins the
    # exact multi-arch index the v0.9.0 build published, and proves it exists:
    # main must never name an image that has not been built (see check-release).
    image: ghcr.io/coreyphillips/beignet-app:0.9.0@sha256:ad79e706f3d17f911aa84509f7a0f01b267a9780f1351ab32424b68dfbc2fd2e
    restart: on-failure
    init: true
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      PORT: "3000"
      DATA_DIR: /data
      # Electrum is optional: this app declares no dependency, so a local
      # Electrs/Fulcrum is not required. If those apps are installed their
      # exported vars are not injected here (only declared deps are), so these
      # seed defaults are normally empty and the user picks a server in the UI
      # (with one-click presets for Umbrel's Electrs/Fulcrum). If a value is
      # present it seeds the app default on first boot.
      DEFAULT_ELECTRUM_HOST: "${APP_ELECTRS_NODE_IP:-}"
      DEFAULT_ELECTRUM_PORT: "${APP_ELECTRS_NODE_PORT:-50001}"
      DEFAULT_ELECTRUM_TLS: "false"
      DEFAULT_NETWORK: "${APP_BITCOIN_NETWORK:-mainnet}"
      # Internal port range for the per-wallet beignet daemons:
      CHILD_PORT_BASE: "3101"
      CHILD_PORT_MAX: "3999"
      # The app's own bundled Tor (service "tor" below). The SOCKS proxy is
      # for per-wallet outbound Lightning over Tor; the control port (29051)
      # is used to publish an inbound hidden service via ADD_ONION. Bundled
      # instead of umbrelOS's system tor_proxy so a broken system Tor
      # (getumbrel/umbrel#2189) cannot take the app's connectivity down with
      # it. The password matches the HashedControlPassword in torrc.template.
      # Addressed by container name, never the bare service alias "tor": every
      # app sits on the shared umbrel_main_network and other apps (Bitcoin, Core
      # Lightning) also define a "tor" service, so the bare alias round-robins
      # across them and would send our control-port auth to the wrong daemon.
      TOR_PROXY_IP: "beignet-wallet_tor_1"
      TOR_PROXY_PORT: "9050"
      TOR_PASSWORD: "beignetonionbrrr"
    depends_on:
      - tor

  tor:
    # Pinned for the same reason as the manager: TOR_PROXY_IP above addresses this
    # container by name.
    container_name: beignet-wallet_tor_1
    image: ghcr.io/getumbrel/tor:0.4.9.11@sha256:e382b8629c0dfef6ceb396b062622d4e4e955b19d6f16b883fd2c0723ad5671a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
