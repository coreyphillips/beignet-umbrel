version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: beignet-wallet-manager-1
      APP_PORT: 3000

  manager:
    image: ghcr.io/coreyphillips/beignet-app:0.4.0@sha256:887a3c0fc0bbc29a1693408392e256a15ae25c0aec3f6b068492ac2c46fd5c7f
    restart: on-failure
    init: true
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
      # Read-only view of Umbrel's Tor data dir to read this app's onion
      # hostname (created by the tor service below). Same pattern app_proxy uses.
      - ${TOR_DATA_DIR}:/tordata:ro
    environment:
      PORT: "3000"
      DATA_DIR: /data
      # Electrum is optional: this app declares no dependency, so a local
      # Electrs/Fulcrum is not required. If those apps are installed their
      # exported vars are not injected here (only declared deps are), so these
      # seed defaults are normally empty and the user picks a server in the UI
      # (with one-click presets for Umbrel's Electrs/Fulcrum). If a value is
      # present it seeds the app default on first boot.
      DEFAULT_ELECTRUM_HOST: "${APP_ELECTRS_NODE_IP:-}"
      DEFAULT_ELECTRUM_PORT: "${APP_ELECTRS_NODE_PORT:-50001}"
      DEFAULT_ELECTRUM_TLS: "false"
      DEFAULT_NETWORK: "${APP_BITCOIN_NETWORK:-mainnet}"
      # Internal port range for the per-wallet beignet daemons:
      CHILD_PORT_BASE: "3101"
      CHILD_PORT_MAX: "3999"
      # Umbrel Tor SOCKS proxy (per-wallet opt-in for outbound Lightning):
      TOR_PROXY_IP: "${TOR_PROXY_IP:-}"
      TOR_PROXY_PORT: "${TOR_PROXY_PORT:-}"
      # Onion hostname for inbound Lightning (created by the tor service):
      ONION_HOSTNAME_FILE: /tordata/app-beignet-wallet-p2p/hostname

  # Dedicated Tor instance that publishes one hidden service mapping each
  # wallet's listen port to an onion virtual port (see torrc).
  tor:
    image: getumbrel/tor:0.4.7.8@sha256:2ace83f22501f58857fa9b403009f595137fa2e7986c4fda79d82a8119072b6a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/torrc:/etc/tor/torrc:ro
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: "/tmp"
