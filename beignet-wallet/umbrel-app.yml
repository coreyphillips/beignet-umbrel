  - https://raw.githubusercontent.com/coreyphillips/beignet-umbrel/main/beignet-wallet/gallery/3.png
releaseNotes: >-
  The Send tab now knows what the wallet knows.


  Pay-during-splice shipped two releases ago, and the wallet engine has been
  happily settling payments through splice windows ever since. The dashboard,
  however, was never told: the one flag that says "this channel works right
  now" was computed and then dropped before it reached the screen, so the
  Send tab kept a mid-splice channel politely disabled while the engine
  underneath would have paid without complaint. The flag now makes the trip,
  and the Send tab lights up mid-splice the way it always should have.


  The channel detail view also stops scolding a working channel: a channel
  paying through its splice no longer reports itself as a problem, and its
  diagnostics tell the truth about invoices routing to it just fine.


  Ships beignet 0.6.2. Found within minutes of real testing on a real
  Umbrel, which is what real testing is for.

