releaseNotes: >-
  Turning on Tor no longer knocks out a channel to a peer on your own network.


  Enabling Tor sent every outbound connection through it, and Tor refuses to
  reach private and local addresses. A node that already had a channel to a
  peer on its LAN would fail to reconnect the moment Tor came on, with the logs
  filling up with "Socks5 proxy rejected connection" and the node reporting
  sync degraded until Tor was switched back off. Now the routing is chosen per
  peer: onion addresses go through Tor, addresses on your own network go direct
  because Tor could never reach them anyway, and public peers still go through
  Tor for the privacy that turning it on is meant to buy.


  Opening a channel can also target one of your own nodes now. The Open channel
  window gains a Connect to picker, the same one the Send tab has, so you can
  choose another of your running wallets instead of copying its pubkey and port
  across by hand.


  Ships beignet 0.6.3.


  Still beignet 0.6.2. This one is all dashboard.

