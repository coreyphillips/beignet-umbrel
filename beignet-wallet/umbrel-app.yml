releaseNotes: >-
  Channel opens work against modern routing nodes, the Liquidity card stays
  honest during splices, and a dropped peer is visible and fixable.


  Opening a channel to a peer running dual funding (Core Lightning today, and a
  growing share of the network) used to be rejected during negotiation with a
  cryptic error. Opens now speak the v2 protocol those peers require and fund
  themselves from your on-chain balance exactly like before.


  Splicing a channel used to zero the Liquidity card for the whole splice, even
  though sats stayed sendable throughout. The card now counts a splicing
  channel at the conservative side of its balances, so what you see matches
  what you can spend.


  A channel whose peer connection dropped now shows a "peer offline" badge in
  the channels list, with a one-click Reconnect that resolves the peer's
  address for you. Payment retries actually retry after temporary failures,
  a recipient one block ahead of your node no longer fails a payment for good,
  and a failed channel open cleans up after itself instead of leaving a stuck
  entry in the list.


  Ships beignet 0.7.0.

