releaseNotes: >-
  Bigger channels, steadier connections, and larger payments.


  Large channels are now on by default, so you can open a channel bigger than
  the old ~0.167 BTC limit to any peer that supports them, which every major
  node does. Together with the sweeping Max open from the last release, funding
  a channel with your whole balance now works no matter the size.


  Connections hold together better. When a peer's side of a connection drops
  without your node noticing, usually a Tor circuit collapsing, it re-dials
  right away; your node used to still be holding the dead socket and turn the
  fresh connection away. Now the stale one is replaced, so the peer reconnects
  instead of being locked out until a timeout expires.


  Single payments are no longer capped at 500,000 sats in flight. The limit now
  scales with the channel, so a larger payment can go out in one shot.


  Ships beignet 0.6.6.


  Still beignet 0.6.2. This one is all dashboard.

