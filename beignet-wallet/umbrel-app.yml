releaseNotes: >-
  Fixes from a day of hard real-world testing, and a tidier channels list.


  When a peer closed a channel to you cooperatively, the returned funds went
  to an address your wallet did not watch, and only reappeared after a wallet
  restart. Close payouts now land directly in your on-chain balance.


  Channels opened on older versions carried an invisible 500,000 sat
  per-payment ceiling for life, so a large payment could fail as "no route"
  with plenty of balance in the channel. The ceiling now reflects what the
  channel can actually carry, and existing channels correct themselves
  automatically.


  Sending an amount at the exact edge of what a channel could afford might
  force-close the channel outright. Senders now keep a small safety margin,
  the same protection other Lightning implementations use, so an
  edge-of-balance payment fails politely instead of costing you the channel.


  The channels list is now split into Open and Closed tabs, so finished
  channels keep their history without burying the live ones.


  Ships beignet 0.7.1.

