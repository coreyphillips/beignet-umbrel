releaseNotes: >-
  Splices now survive anything.


  Last release taught your wallet to pay during splices. This one makes the
  whole affair indestructible: restart the app mid-splice, mid-payment, even
  mid-handshake, and everything picks up exactly where it left off. The
  wallet no longer needs anything it kept in memory; every piece of the
  splice that matters is written down the moment it matters, so a restart at
  the worst possible instant changes nothing.


  The same is true of the emergency exits. If your channel partner vanishes
  while a splice confirms, the wallet can always close the channel on
  whichever version of it actually made it onto the chain, with exact
  signatures kept for exactly that purpose. Cases that used to end in a
  cautious "refusing to proceed" now simply recover.


  Ships beignet 0.6.1. No visible changes; this is the release you will
  never notice working, which is the point.

