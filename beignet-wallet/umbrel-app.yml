releaseNotes: >-
  A splice no longer empties your wallet on screen.


  While a splice waited for its confirmations, the dashboard showed a wallet
  with nothing in it: the on-chain balance had (correctly) gone into the
  splice, and the funds in the channel vanished from every figure until the
  splice locked. Worse, the numbers that were shown were the pre-splice ones,
  so sats you had just spliced in were nowhere at all.


  The wallet now accounts for a splice in progress as its own line: the
  Overview says a splice is confirming and how much is locked, the amount sits
  under the Lightning stat until it rejoins the balance proper, and the
  channel detail shows exactly what the channel settles to when the splice
  locks. The Send tab also stopped telling you to "open a channel first" when
  your channel was merely mid-splice; it now says so, and that payments resume
  when the splice confirms.


  Payments during the splice itself are the next, much larger piece of work;
  this release makes the waiting honest.


  Ships beignet 0.5.8.

