releaseNotes: >-
  Opening channels between your own Beignet wallets now works properly.


  A channel opened from one Beignet wallet to another silently stalled
  partway through negotiation: the receiving side never finished its half
  of the handshake, so the channel sat in DUAL_FUNDING_V2 forever and
  showed an unknown, offline peer. No funds were ever at risk, since the
  stall happened before any transaction was signed, and any stuck entry
  clears when the app restarts. Both sides now complete the open and the
  channel confirms and activates like any other.


  The Max button works for these opens too. It previously failed with
  "max funding is not yet supported on a dual-funded (v2) open". Max now
  sweeps the whole balance into the channel with no change output. The
  final channel size can differ from the form's preview by a few sats,
  since the funding fee for this kind of open is priced slightly
  differently; the channel that opens shows the exact amount.


  Channels still opening also now show their real peer instead of
  "unknown node", so the Reconnect button works during an open.


  Ships beignet 0.7.2.

