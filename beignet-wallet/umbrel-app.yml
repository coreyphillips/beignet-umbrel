releaseNotes: >-
  Fixes channel opens that appeared to work and then quietly failed.


  Opening a channel reported success as soon as the request was sent, before the
  peer had agreed to anything. If the peer then rejected the channel, or the
  funding could not be built, the pending channel simply vanished from the list
  and no on-chain funds ever moved. The reason was thrown away, so there was
  nothing to go on.


  Beignet now waits for the real outcome. A channel is only reported as open once
  its funding transaction is broadcast, and a failure now tells you exactly what
  the peer said, for example that the amount was below that node's minimum
  channel size.


  New Logs tab. Every wallet now shows its daemon's output and any node errors,
  with copy and download, so nothing is swallowed.


  Note that large custodial and exchange nodes commonly refuse connections from
  nodes they have no channel with. Opening a channel to one of those by
  connecting to it cannot work; the app now explains that instead of failing
  silently.

