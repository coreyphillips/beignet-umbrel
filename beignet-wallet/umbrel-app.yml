releaseNotes: >-
  The engine upgrade. Every wallet here runs on beignet, and this release moves
  all of them from beignet 0.5.3 to 0.5.4, a release large enough that it
  arguably should have been called 0.6. Nothing about the dashboard changes;
  a lot underneath it does.


  Channel splicing matured. Resizing a channel now properly negotiates quiet
  time with the peer before the funding transaction is rebuilt, a splice out
  can pay to an address you choose, and the channel backup refreshes itself
  the moment a splice completes rather than before it is real.


  Channel closes got safer. The engine is better at recognizing and sweeping
  what a closing channel leaves on chain, anchors and stuck payments included,
  and at claiming the penalty when a peer broadcasts an old state.


  Fee estimates for taproot inputs were simply wrong: they were weighed as if
  the witness discount did not exist, so spending taproot coins looked more
  expensive than it was. They are weighed correctly now, which the send screen
  and fee sliders inherit for free.


  BOLT12 offers are more robust, with replies carried over blinded paths and
  failures reported as proper invoice errors instead of silence.


  The daemon API is identical to 0.5.3, so existing wallets carry over
  untouched and there is nothing to migrate. Your wallets simply restart on
  the new engine.

