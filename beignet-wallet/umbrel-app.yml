manifestVersion: 1
id: beignet-wallet
name: Beignet
tagline: Self-custodial Bitcoin and Lightning wallets
icon: https://raw.githubusercontent.com/coreyphillips/beignet-umbrel/main/beignet-wallet/icon.svg
category: bitcoin
version: "0.4.8"
port: 2113
description: >-
  Beignet lets you run one or many self-custodial Bitcoin and Lightning wallets
  on your Umbrel, powered by the beignet wallet engine.


  Create new wallets on the fly or import your own seed phrase. Each wallet runs
  as an independent node with its own on-chain wallet and Lightning identity.


  No full node required. Point Beignet at any Electrum server you like, or, if
  you run the Electrs or Fulcrum app on your Umbrel, connect to it with a single
  click. You can set a default Electrum server for new wallets and override it
  per wallet.
developer: Corey Phillips
website: https://github.com/coreyphillips/beignet
submitter: Corey Phillips
submission: https://github.com/coreyphillips/beignet-umbrel
repo: https://github.com/coreyphillips/beignet-umbrel
support: https://github.com/coreyphillips/beignet/issues
gallery:
  - https://raw.githubusercontent.com/coreyphillips/beignet-umbrel/main/beignet-wallet/gallery/1.png
  - https://raw.githubusercontent.com/coreyphillips/beignet-umbrel/main/beignet-wallet/gallery/2.png
  - https://raw.githubusercontent.com/coreyphillips/beignet-umbrel/main/beignet-wallet/gallery/3.png
releaseNotes: >-
  Clearer fees and smarter Tor handling. Opening a channel now shows your
  available balance, the estimated funding fee, and the total needed, and
  stops you before an open that cannot be funded. Splicing gets live fee
  presets instead of a hardcoded rate.


  Wallets with Tor enabled now detect when Tor cannot build circuits (the
  cause of every connection timing out) and show a banner explaining how to
  fix it. The app also no longer hangs at "Starting..." when Tor is
  unresponsive during install or boot.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
