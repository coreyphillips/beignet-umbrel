releaseNotes: >-
  The Liquidity card now tells the truth about what you can send.


  "Can send" used to show your channel balance, but every channel holds back a
  small reserve on your side that cannot be spent, so the number was always a
  little high, and a freshly opened channel funded on the peer's side showed a
  sendable balance it did not actually have. Can send now shows what can really
  go out, which reads zero while your balance is still below the reserve. In
  that state the card adds a small bar of your balance filling toward the
  reserve, with both amounts listed, so it is clear how much further there is to
  go. The outbound bar follows the same figure and draws the locked reserve as
  its own muted sliver rather than counting it as spendable.


  Ships beignet 0.6.4, which is what surfaces the reserve and sendable figures.


  Still beignet 0.6.2. This one is all dashboard.

