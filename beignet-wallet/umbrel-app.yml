releaseNotes: >-
  A round of fixes and features straight from real use.


  Paying the node on the other end of your own channel could fail with "no
  route", which is absurd: the route is one hop long and you own it. Once the
  channel got announced, the wallet trusted the public gossip copy of it, and
  when that copy was missing the wallet's own signed update the channel became
  untraversable. The wallet now stands its own knowledge of its own channels
  in whenever the gossip copy is unusable.


  Opening a channel no longer scares you. While a fresh channel waited out its
  funding confirmations the status said "degraded", which is the dashboard's
  word for something is wrong. Nothing was wrong. Degraded is now reserved for
  channels that are actually broken or operational channels with no peer to
  use them; an open, a splice or a cooperative close in progress will not trip
  it.


  Channels open now. Click a channel row and you get what the daemon already
  knew: peer connectivity, the short channel id, announcement status, HTLC
  slots in use, the routing policy, and the daemon's own diagnosis of anything
  wrong.


  Splicing got the Send treatment: the same slider and Max button, with the
  ceiling moving with your fee rate. A splice out also holds back the roughly
  one percent channel reserve your peer requires, so the daemon no longer
  rejects an amount the dashboard happily offered you.


  New Console tab: a terminal for the wallet daemon's own API. GET /health,
  POST /invoice/create, all 129 routes, through the same sign-on protected
  connection as every button in the dashboard, with history on the arrow keys.


  Also fixed: long log lines stretched the whole page sideways instead of
  scrolling inside the log box, and the Lightning invoice string under the QR
  code ran beneath the copy icon instead of trimming itself.


  Ships beignet 0.5.6.

