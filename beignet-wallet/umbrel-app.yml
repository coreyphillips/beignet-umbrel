releaseNotes: >-
  Your wallet pays during splices now.


  Until today, a splice put the channel to sleep: no sending, no receiving,
  nothing to do but watch confirmations tick by. That was never what the
  protocol demanded, only what remained to be built. It is built. While a
  splice waits for its confirmations, the channel keeps working: you can pay,
  be paid, and the moment the splice locks, the new capacity simply joins in.
  Every payment made during the window is protected on both the old and the
  new channel funding, whichever the chain settles on, and if your node or
  the connection drops mid-payment, the exchange picks up where it left off
  on reconnect.


  The dashboard follows suit: the Send tab treats a channel mid-splice as the
  working channel it now is, the Overview note says payments keep flowing
  rather than counselling patience, and balances stay honest through the
  whole window, disconnections included.


  This was tested the way it will be used: against a real Core Lightning
  node, with real payments crossing a channel whose splice sat unconfirmed in
  the mempool, in both directions, through a disconnect, and out the other
  side of the lock.


  Ships beignet 0.6.0. One footnote: channels using the experimental taproot
  type still pause during splices for now; ordinary channels, like the ones
  this app opens, do not.

