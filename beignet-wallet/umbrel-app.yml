manifestVersion: 1
id: beignet-wallet
name: Beignet
tagline: Self-custodial Bitcoin and Lightning wallets
icon: https://raw.githubusercontent.com/coreyphillips/beignet-umbrel/main/beignet-wallet/icon.svg
category: bitcoin
version: "0.5.0"
port: 2113
description: >-
  Beignet lets you run one or many self-custodial Bitcoin and Lightning wallets
  on your Umbrel, powered by the beignet wallet engine.


  Create new wallets on the fly or import your own seed phrase. Each wallet runs
  as an independent node with its own on-chain wallet and Lightning identity.


  No full node required. Point Beignet at any Electrum server you like, or, if
  you run the Electrs or Fulcrum app on your Umbrel, connect to it with a single
  click. You can set a default Electrum server for new wallets and override it
  per wallet.
