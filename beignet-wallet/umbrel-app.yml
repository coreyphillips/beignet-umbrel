releaseNotes: >-
  Amount and fee sliders, a Max button, and fees that are the real number.


  Typing a satoshi amount by hand was the only way to send or open a channel.
  Both now have a slider and a Max button alongside the field. Max is worked out
  from the live fee rate rather than frozen when you press it, so changing the fee
  moves the amount with it and the total never exceeds your balance.


  The fee is no longer an estimate. The wallet prices the transaction with the
  same coin selection it will really use and reports what it will actually pay,
  including which script the money is going to: paying a taproot address, or
  funding a channel into its 2-of-2, costs more than an ordinary payment, and the
  figure now says so.


  Opening a channel lets you choose the funding fee rate, defaulting to fast. Max
  is exact because of it: the whole balance goes into the channel except the fee,
  with nothing held back for a guess.


  This release also carries fixes from the beignet engine, where every sweep had
  been quietly underpaying its fee and going out below the rate it was given.

