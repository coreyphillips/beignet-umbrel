releaseNotes: >-
  The Peers tab now leads with who you are connected to.


  Connect to a peer moves below the connected list, because seeing your peers
  is the thing you come back for and connecting is the thing you do once. Each
  peer now shows its alias, read from the gossip graph, above its pubkey, and
  a node that never announced one simply reads as unknown rather than a wall
  of hex. The pubkey itself is a copy button now, so handing a peer's key to
  someone is one click instead of a careful drag.


  The two Tor options finally say which way they point. One is outbound,
  connecting to peers over Tor; the other is inbound, publishing a Tor address
  so peers can open channels to you. Same two switches, grouped under a Tor
  heading, no more guessing which one is which.


  Still beignet 0.6.2. All dashboard.


  Still beignet 0.6.2. This one is all dashboard.

