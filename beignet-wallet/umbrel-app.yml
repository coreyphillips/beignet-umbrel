releaseNotes: >-
  A few rough edges smoothed over on the dashboard.


  The address and invoice strings under the Receive tab QR codes now sit
  centered beneath their code instead of hanging off to the left.


  A payment that fails because your side of a channel is below the amount plus
  the reserve every channel holds back used to report as "the peer rejected the
  channel", which was wrong on both counts. It now says what actually happened:
  not enough spendable balance, and that the reserve keeps your sendable amount
  a little under your channel balance.


  The banner shown when your Umbrel's Tor cannot build circuits no longer warns
  that every peer connection will fail. Since the last release routes peers on
  your own network directly, only Tor-reached peers are affected, and the banner
  now says so.


  Still beignet 0.6.3. All dashboard.


  Still beignet 0.6.2. This one is all dashboard.

