<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Beignet wallet API</title>
		<link rel="icon" type="image/svg+xml" href="/icon.svg" />
		<link rel="stylesheet" href="/vendor/swagger/swagger-ui.css" />
		<style>
			body { margin: 0; background: #fafafa; }
			.bar {
				display: flex; align-items: center; gap: 12px;
				padding: 12px 18px;
				background: linear-gradient(120deg, #0a0c12, #141724 60%, #1a1430);
				color: #eef0f6;
				border-bottom: 1px solid rgba(255, 255, 255, 0.09);
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			}
			.bar a { color: #ffb454; text-decoration: none; font-size: 14px; }
			.bar h1 { font-size: 16px; margin: 0; font-weight: 620; letter-spacing: -0.01em; }
			#error { padding: 24px; font-family: sans-serif; color: #b00020; }
		</style>
	</head>
	<body>
		<div class="bar">
			<a href="/">&larr; Wallets</a>
			<h1 id="title">Wallet API</h1>
		</div>
		<div id="error"></div>
		<div id="swagger"></div>
		<script src="/vendor/swagger/swagger-ui-bundle.js"></script>
		<script>
			const params = new URLSearchParams(location.search);
			const id = params.get('id');
			if (!id) {
				document.getElementById('error').textContent = 'Missing wallet id.';
			} else {
				document.getElementById('title').textContent = `Wallet ${id.slice(0, 8)} API`;
				window.ui = SwaggerUIBundle({
					url: `/api/wallets/${id}/openapi.json`,
					dom_id: '#swagger',
					deepLinking: true,
					presets: [SwaggerUIBundle.presets.apis],
					layout: 'BaseLayout',
					tryItOutEnabled: true
				});
			}
		</script>
	</body>
</html>
