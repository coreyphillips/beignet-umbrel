<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Beignet</title>
		<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A5%AF%3C/text%3E%3C/svg%3E" />
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<header class="topbar">
			<div class="brand">
				<span class="brand-mark">🥯</span>
				<div>
					<h1>Beignet</h1>
					<p class="sub">Self-custodial Bitcoin &amp; Lightning wallets</p>
				</div>
			</div>
			<div class="topbar-right">
				<div class="env" id="env"></div>
				<button id="settings-btn" class="ghost">Settings</button>
			</div>
		</header>

		<main>
			<section class="card">
				<div class="tabs">
					<button class="tab active" data-tab="create">Create wallet</button>
					<button class="tab" data-tab="import">Import wallet</button>
				</div>

				<form id="create-form" class="panel active" autocomplete="off">
					<div class="row">
						<label>Name<input name="name" placeholder="My wallet" /></label>
						<label>Network<select name="network" class="network"></select></label>
						<label>Seed length
							<select name="wordCount">
								<option value="24">24 words</option>
								<option value="12">12 words</option>
							</select>
						</label>
					</div>
					<div class="electrum-block" data-for="create"></div>
					<button type="submit" class="primary">Create wallet</button>
				</form>

				<form id="import-form" class="panel" autocomplete="off">
					<div class="row">
						<label>Name<input name="name" placeholder="Imported wallet" /></label>
						<label>Network<select name="network" class="network"></select></label>
					</div>
					<label>Recovery phrase
						<textarea name="mnemonic" rows="3" placeholder="Enter your 12 or 24 word seed phrase"></textarea>
					</label>
					<div class="electrum-block" data-for="import"></div>
					<button type="submit" class="primary">Import wallet</button>
				</form>
			</section>

			<section class="card">
				<div class="section-head">
					<h2>Wallets</h2>
					<button id="refresh" class="ghost">Refresh</button>
				</div>
				<div id="wallets" class="wallets"></div>
			</section>
		</main>

		<div id="modal" class="modal hidden">
			<div class="modal-box">
				<div class="modal-head">
					<h3 id="modal-title"></h3>
					<button id="modal-close" class="ghost">Close</button>
				</div>
				<div id="modal-body"></div>
			</div>
		</div>

		<script src="app.js"></script>
	</body>
</html>
